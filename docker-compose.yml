services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/agentic_rag_workbench}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      APP_ENV: ${APP_ENV:-development}
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-local}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      ENABLE_DOCS: ${ENABLE_DOCS:-true}
      ENABLE_DEMO_ENDPOINTS: ${ENABLE_DEMO_ENDPOINTS:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CHROMA_HOST: ${CHROMA_HOST:-chroma}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-business_documents}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-120}
    depends_on:
      chroma:
        condition: service_started
      postgres:
        condition: service_healthy

  chroma:
    image: chromadb/chroma:1.5.9
    volumes:
      - chroma_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: agentic_rag_workbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d agentic_rag_workbench
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  chroma_data:
  postgres_data:
